services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: harness
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness -d harness"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - ../.env
    command:
      [
        "sh",
        "-c",
        "python scripts/init_mock_db.py && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload",
      ]
    environment:
      APP_NAME: Marketing AI Demo API
      APP_VERSION: 0.1.0
      APP_ENV: docker
      API_PREFIX: /api/v1
      PUBLIC_API_BASE_URL: http://127.0.0.1:18080/api/v1
      BACKEND_CORS_ORIGINS: http://127.0.0.1:13000,http://localhost:13000
      DATABASE_URL: postgresql+psycopg://harness:harness@postgres:5432/harness
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ASSET_STORAGE_DIR: /tmp/marketing_ai_uploads
      WEBHOOK_SECRET: dev-webhook-secret
      BLOG_API_BASE_URL: https://blog.example.com/api
      BLOG_API_TOKEN: replace-me
      OBSERVABILITY_SLOW_REQUEST_MS: 1500
    ports:
      - "18080:8000"
    volumes:
      - ../backend/app:/workspace/backend/app
      - ../backend/scripts:/workspace/backend/scripts
      - ../backend/tests:/workspace/backend/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - ../.env
    command:
      [
        "python",
        "-m",
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "--loglevel=info",
      ]
    environment:
      APP_NAME: Marketing AI Demo API
      APP_VERSION: 0.1.0
      APP_ENV: docker
      API_PREFIX: /api/v1
      PUBLIC_API_BASE_URL: http://127.0.0.1:18080/api/v1
      BACKEND_CORS_ORIGINS: http://127.0.0.1:13000,http://localhost:13000
      DATABASE_URL: postgresql+psycopg://harness:harness@postgres:5432/harness
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ASSET_STORAGE_DIR: /tmp/marketing_ai_uploads
      WEBHOOK_SECRET: dev-webhook-secret
      BLOG_API_BASE_URL: https://blog.example.com/api
      BLOG_API_TOKEN: replace-me
      OBSERVABILITY_SLOW_REQUEST_MS: 1500
    volumes:
      - ../backend/app:/workspace/backend/app
      - ../backend/scripts:/workspace/backend/scripts
      - ../backend/tests:/workspace/backend/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:18080/api/v1
    ports:
      - "13000:3000"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
